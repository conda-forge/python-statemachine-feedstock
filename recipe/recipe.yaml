schema_version: 1

context:
  name: python-statemachine
  version: "3.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/python_statemachine-${{ version }}.tar.gz
  sha256: 91523f9ead73c1d6fecc975d5c6e0bfe363fbf537c5f0bf309bcd0f94f9441b2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - statemachine
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - 3.*

about:
  summary: Python Finite State Machines made easy.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/fgmacedo/python-statemachine
  repository: https://github.com/fgmacedo/python-statemachine
  documentation: https://python-statemachine.readthedocs.io

extra:
  recipe-maintainers:
    - beenje
